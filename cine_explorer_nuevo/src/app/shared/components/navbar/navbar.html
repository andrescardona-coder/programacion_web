<!--Navbar responsive de Bootstrap-->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <!--Navbar-dark: texto blanco-->
    <!--bg-dark: fondo oscuro-->

    <div class="container">
        <!--Logo/nombre de la app como link al inicio-->
        <!--routerLink: "/" navega a la ruta raiz sin recargar la pagina-->
        <a class="navbar-brand" routerLink="/">🎬 CineExplorer</a>

        <!--Boton hamburguesa para moviles-->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
             <span class="navbar-toggler-icon">
             </span>
        </button>

            <!--Links de navegación-->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!--ms-auto: empuja los links a la derecha-->

                    <li class="nav-item">
                        <!--routerLink: navega a la ruta especificada-->
                        <!--routerLinkActive: "active: agrega la clases "active" cuando la ruta no coincide-->
                        <a class="nav-link" routerLink="/"
                           routerLinkActive="active"
                           [routerLinkActiveOptions]="{exact: true}">
                           Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" routerLink="/favorites"
                        routerLinkActive="active">
                        <!--Mostrar badge con cantidad de favoritas-->
                        Favoritos
                        @if (cantidadFavoritas >0){
                            <span class="badge bg-danger ms-1">{{cantidadFavoritas}}</span>
                        }
                        </a>
                    </li>
                </ul>

                <form class="d-flex ms-auto" role="search">
                    <!--[formControl] vincula el input a un formControl reactivo-->
                    <input
                    [formControl]="searchControl"
                    class="form-control me-2"
                    type="search"
                    placeholder="Buscar peliculas..."
                    aria-label="Buscar">
                </form>

                <!--Boton de tema claro/oscuro-->
                <button (click)="toggleTema()" class="btn btn-outline-light btn-sm ms-2">
                    {{temaActual=== 'light' ? '🌙' : '☀️'}}
                </button>
            </div>
       </div>
   </nav>
